# ru: Языки которые встроены: ru или en
# en: Languages that are embedded: ru или en
language: ru

settings:
  # ru: Включить расширение границ за ачивки?. Если false, плагин работает только как топ/рейтинг по ачивкам.
  # en: Enable border expansion for achievements?. If false, the plugin only works as a top/ranking for achievements.
  enable_border_expansion: true

  # ru: На сколько блоков увеличивается граница при получении ачивки. В аду автоматически делится на 8 (15.0 / 8 = 1.875)
  # en: How many blocks are added to the border when an achievement is obtained. Nether is automatically divided by 8 (15.0 / 8 = 1.875)
  expand_amount: 15.0

  # ru: Режим изменения границы:
  # ru:  smooth - плавное расширение за указанное время (граница движется всё время)
  # ru:  delay  - отложенное изменение (граница стоит, потом мгновенно расширяется)
  # en: Border change mode:
  # en:  smooth - smooth expansion over the specified time (the border moves all the time)
  # en:  delay - delayed change (the border stands still, then expands instantly)
  border_change_mode: "smooth"

  # ru: Время для smooth или delay. Поддерживаются суффиксы: t (тики), s (секунды), d (дни). Примеры: "20t", "1.5s", "1d"
  # en: Time for smooth or delay. Supported suffixes: t (ticks), s (seconds), d (days). Examples: "20t", "1.5s", "1d"
  border_move_speed: "200t"

  # ru: Автоматически устанавливать первоначальную границу при первом старте плагина?
  # en: Automatically set the initial border when the plugin is first launched?
  set_initial_border_on_first_start: true

  # ru: Размер первоначальной границы. Аду автоматически поделится на 8 (35.0 / 8 = 4.375)
  # en: The size of the initial border. Nether will be automatically divided by 8 (35.0 / 8 = 4.375)
  initial_border_size: 35.0

  # ru: Применять расширение ко ВСЕМ загруженным мирам автоматически?
  # en: Apply the extension to ALL loaded worlds automatically?
  apply_to_all_worlds: false

  # ru: Список миров (используется только если apply_to_all_worlds = false)
  # en: List of worlds (used only if apply_to_all_worlds = false)
  allowed_worlds:
    - "world"
    - "world_nether"
    - "world_the_end"

  # ru: Уведомление о новом размере границы только игроку, получившему ачивку? false = всем
  # en: Notify new border size only to the player who got the achievement? false = everyone
  notify_only_player: true

  # ru: Эффекты при расширении границы
  # en: Effects on border expansion
  effects:
    # ru: Звук при расширении (название из Sound enum, например "entity.ender_dragon.growl"). Оставьте пустым для отключения.
    # en: Sound on expansion (Sound enum name, e.g. "entity.ender_dragon.growl"). Leave empty to disable.
    sound: "entity.ender_dragon.growl"

    # ru: Громкость звука (0.0 - 1.0)
    # en: Sound volume (0.0 - 1.0)
    sound_volume: 0.8

    # ru: Высота тона звука (0.5 - 2.0)
    # en: Sound pitch (0.5 - 2.0)
    sound_pitch: 1.0

    # ru: Показывать ли заголовок (Title) при расширении
    # en: Show title on expansion?
    title: true

    # ru: Показывать ли подзаголовок (Subtitle) с новым размером
    # en: Show subtitle with new size?
    subtitle: true

# ru: GUI настройки (только слоты) 
# en: GUI settings (only slots)
gui:
  # ru: Слоты для голов игроков (инвентарь 54 слота) 
  # en: Slots for player heads (54 slots inventory)
  slots: [10,11,12,13,14,15,16,19,20,21,22,23,24,25,28,29,30,31,32,33,34,37,38,39,40,41,42,43]

# ru: Блокировка миров до достижения определённого количества достижений на сервере
# en: Lock worlds until a certain total number of achievements is reached
world_locking:
  # ru: Включить механизм блокировки миров
  # en: Enable world locking
  enabled: true

  # ru: Если true – блокируются ВСЕ загруженные миры (все, что есть на сервере)
  # ru: Если false – блокируются только миры, перечисленные в секции worlds
  # en: If true – ALL loaded worlds are locked (all worlds on the server)
  # en: If false – only worlds listed in the worlds section are locked
  apply_to_all_worlds_for_locking: false

  # ru: Порог достижений по умолчанию (используется, если в worlds не задан свой порог)
  # en: Default achievement threshold (used if a world has no custom threshold in worlds)
  default_required: 150

  # ru: Индивидуальные пороги для конкретных миров (переопределяют default_required)
  # en: Custom thresholds for specific worlds (override default_required)
  worlds:
    world_nether:
      required_achievements: 150
    world_the_end:
      required_achievements: 450

  # ru: Показывать Title при попытке входа в заблокированный мир? (сообщение в чате всегда будет)
  # en: Show Title when trying to enter a locked world? (chat message always appears)
  show_deny_title: true

# ru: Режим отладки (выводит подробности в консоль)
# en: Debug mode (logs detailed info to console)
debug: false